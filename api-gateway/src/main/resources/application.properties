# ==========================================
# API Gateway Configuration
# ==========================================

# Application name
spring.application.name=api-gateway

# Port on which API Gateway will run
server.port=8080

# ==========================================
# Routes Configuration
# ==========================================

# Route requests to User Service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# Route requests to Product Service
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

# Route requests to Order Service
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**

# ==========================================
# JWT Configuration
# ==========================================

# Secret key used to validate JWT tokens
# Must be same as User Service JWT secret
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ==========================================
# Security Configuration
# ==========================================

# Disable default Spring Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration