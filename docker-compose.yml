version: '3.8'

services:

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: shopsphere-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: userservice_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Kafka
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopsphere-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - shopsphere-network

  # ==========================================
  # User Service
  # ==========================================
  user-service:
    build: ./user-service
    container_name: shopsphere-user-service
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userservice_db
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shopsphere-network

  # ==========================================
  # Product Service
  # ==========================================
  product-service:
    build: ./product-service
    container_name: shopsphere-product-service
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/productservice_db
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shopsphere-network

  # ==========================================
  # Order Service
  # ==========================================
  order-service:
    build: ./order-service
    container_name: shopsphere-order-service
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/orderservice_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - shopsphere-network

  # ==========================================
  # Notification Service
  # ==========================================
  notification-service:
    build: ./notification-service
    container_name: shopsphere-notification-service
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notificationservice_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - shopsphere-network

  # ==========================================
  # API Gateway
  # ==========================================
  api-gateway:
    build: ./api-gateway
    container_name: shopsphere-api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    networks:
      - shopsphere-network

# ==========================================
# Networks
# ==========================================
networks:
  shopsphere-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql-data: