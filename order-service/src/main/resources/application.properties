# ==========================================
# Order Service Configuration
# ==========================================

# Application name
spring.application.name=order-service

# Port on which order service will run
server.port=8083

# ==========================================
# Database Configuration
# ==========================================

# MySQL database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/orderservice_db

# MySQL credentials
spring.datasource.username=root
spring.datasource.password=root1234

# MySQL driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================

# WARNING: change to validate or none in production
spring.jpa.hibernate.ddl-auto=update

# WARNING: disable in production
spring.jpa.show-sql=true

# Tell Hibernate we are using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Kafka Configuration
# ==========================================

# Kafka broker address
spring.kafka.bootstrap-servers=localhost:9092

# Serialize keys as strings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Serialize values as JSON
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ==========================================
# Feign Client Configuration
# ==========================================

# URL of User Service
user-service.url=http://localhost:8081

# URL of Product Service
product-service.url=http://localhost:8082

# ==========================================
# Security Configuration
# ==========================================

# Disable security - API Gateway handles authentication
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
