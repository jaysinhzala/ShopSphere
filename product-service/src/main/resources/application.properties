# ==========================================
# Product Service Configuration
# ==========================================

# Application name
spring.application.name=product-service

# Port on which product service will run
server.port=8082

# ==========================================
# Database Configuration
# ==========================================

# MySQL database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/productservice_db

# MySQL credentials
spring.datasource.username=root
spring.datasource.password=root1234

# MySQL driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================

# WARNING: change to validate or none in production
spring.jpa.hibernate.ddl-auto=update

# WARNING: disable in production
spring.jpa.show-sql=true

# Tell Hibernate we are using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# AWS S3 Configuration
# ==========================================

# AWS region where S3 bucket is located
aws.region=us-east-1

# S3 bucket name for product images
aws.s3.bucket=shopsphere-products