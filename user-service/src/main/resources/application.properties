# ==========================================
# User Service Configuration
# ==========================================

# Application name used by Spring Cloud
spring.application.name=user-service

# Port on which user service will run
server.port = 8081

# ==========================================
# Database Configuration
# ==========================================

# MySQL database connection URL
spring.datasource.url = jdbc:mysql://localhost:3306/userservice_db

# MySQL credentials
spring.datasource.username = root
spring.datasource.password = root1234

# MySQL driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================

# Auto create/update tables based on entities
spring.jpa.hibernate.ddl-auto=update

# Print SQL queries in console for debugging
spring.jpa.show-sql=true

# Tell Hibernate we are using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================

# Secret key used to sign JWT tokens
# WARNING: change this to a strong random string in production
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Token expiry time in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

